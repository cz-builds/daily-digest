# Topics you care about — used by the scoring prompt.
focus_areas:
  - AI/LLM breakthroughs: new models, training techniques, inference optimization, benchmarks
  - AI on edge/embedded hardware: TinyML, FPGA/ASIC accelerators, quantization, model compression
  - Semiconductor industry: chip architecture, NVIDIA/AMD/Intel moves, RISC-V, EDA tools, fab news
  - Space technology: SpaceX Starship, Artemis program, rocket engineering, satellite systems
  - Open source AI: notable new repos, tools, frameworks
  - First-principles thinking and contrarian takes on technology trends
